<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Hostinger</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="brand"><span class="logo">▣</span><span class="brand-text">Hostinger</span></div>
      <ul id="tablist"></ul>
      <div class="sidebar-foot">
        <button id="btn-settings" class="ghost" title="Settings">⚙ Settings</button>
      </div>
    </nav>
    <main id="content">
      <header id="topbar">
        <div id="crumb"></div>
        <div class="top-actions">
          <span id="busy" class="busy hidden">●</span>
          <button id="btn-refresh" class="ghost" title="Refresh (Ctrl+R)">⟳</button>
        </div>
      </header>
      <section id="view"></section>
    </main>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script src="renderer.js"></script>
</body>
</html>
